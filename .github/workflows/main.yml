name: Deploy GitHub Pages

on:
  push:
    branches:
      - vuepress

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Build
        run: npm install && npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.vuepress }}
          publish_branch: master
          publish_dir: ./public
          force_orphan: true