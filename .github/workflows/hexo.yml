name: Deploy Hexo Site

on:
  push:
    branches:
      - hexo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install Dependencies
        run: yarn install

      - name: Build
        run: yarn build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.DEPLOYSITE }}
          publish_branch: main
          publish_dir: ./public
          force_orphan: true
          
      - name: Deploy_Gitee
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.DEPLOY_GITEE }}
          external_repository: https://gitee.com/yzbtdiy/yzbtdiy.git
          publish_branch: main
          publish_dir: ./public
          force_orphan: true
